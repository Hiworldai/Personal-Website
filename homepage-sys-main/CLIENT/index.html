<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mouse trail effect component">
    <link rel="preload" href="/avatar/profile-photo-display.webp?v=20260505" as="image" type="image/webp" fetchpriority="high">
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #02070c;
      }

      body {
        overflow-x: hidden;
        font-family: 'Trebuchet MS', 'Segoe UI', Arial, sans-serif;
      }

      #app {
        min-height: 100vh;
      }

      .app-boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 28%, rgba(36, 216, 255, 0.12), transparent 22%),
          #02070c;
      }

      .app-boot-copy {
        display: grid;
        place-items: center;
        gap: 16px;
        width: min(88vw, 448px);
        text-align: center;
      }

      .app-boot-avatar {
        position: relative;
        width: 128px;
        aspect-ratio: 1;
        overflow: hidden;
        border: 2px solid rgba(201, 251, 255, 0.92);
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 30%, rgba(84, 233, 255, 0.24), transparent 38%),
          rgba(4, 15, 22, 0.88);
        box-shadow:
          0 0 0 1px rgba(122, 243, 255, 0.12),
          0 0 24px rgba(43, 226, 255, 0.22);
      }

      .app-boot-avatar::after {
        position: absolute;
        inset: 0;
        content: '';
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 28%, transparent 72%, rgba(88, 227, 255, 0.14));
      }

      .app-boot-avatar picture,
      .app-boot-avatar img {
        display: block;
        width: 100%;
        height: 100%;
      }

      .app-boot-avatar img {
        object-fit: cover;
        object-position: 60% center;
      }

      .app-boot-title {
        margin: 0;
        color: #fff;
        font-size: 1.55rem;
        font-weight: 800;
        line-height: 1.2;
        text-shadow:
          0 0 8px rgba(255, 255, 255, 0.82),
          0 0 20px rgba(112, 235, 255, 0.58),
          0 0 42px rgba(41, 229, 255, 0.26);
      }

      @media (max-width: 768px) {
        .app-boot-copy {
          width: min(88vw, 304px);
          gap: 14px;
        }

        .app-boot-avatar {
          width: clamp(122px, 29vw, 142px);
        }

        .app-boot-title {
          width: min(88vw, 12ch);
          font-size: clamp(1.55rem, 6vw, 1.95rem);
          line-height: 1.08;
        }

        .app-boot-title span {
          display: block;
        }
      }
    </style>
    <title>Hi,imchenkanghong</title>
  </head>
  <body>
    <div id="app">
      <div class="app-boot-shell" aria-hidden="true">
        <div class="app-boot-copy">
          <div class="app-boot-avatar">
            <picture>
              <source srcset="/avatar/profile-photo-display.webp?v=20260505" type="image/webp">
              <img
                src="/avatar/profile-photo-display.jpg?v=20260505"
                alt=""
                width="256"
                height="256"
                decoding="async"
              >
            </picture>
          </div>
          <p class="app-boot-title">
            <span>Welcome, I am</span>
            <span>chenkanghong</span>
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
